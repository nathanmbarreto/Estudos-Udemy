<h1>Tags não visuais</h1>

<!-- Tags semânticas

section - agrupamento temático de conteuo 
article - conteúdo auto-contido
header - cabeçalho do documento
footer - rodapé do documento
nav - agrupa links de navegação
aside - de lado, tipo sidebar. Relacionado ao conteudo proximo (adendo)
details - exibe detalhes que pode ser exibidos ou escondidos

as Famosas:

div - divisão ou seção
span - usado para agrupar elementos inline
-->

<div>Área 1</div>
<div>Área 2</div>

<p>
    Esse texto é com <span class="diferente">muitas palavras </span>e ponto
</p>

<style>
    div {
        display: inline;
    }

    span {
        display: block;
    }

    .diferente {
        font-size: 24px;
        font-weight: bold;
        color: rgb(133, 83, 23);
    }
</style>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios HTML</title>
    <style>
        #conteudo {
            padding: 30px 0px;
        }
    </style>
</head>

<body>
    <header>
        Exercicios HTML
    </header>
    <nav>
        <a href wm-nav="exercicios/teste.html">00 - Teste</a> |
        <a href wm-nav="exercicios/1-texto.html">01- Texto 1</a> |
        <a href wm-nav="exercicios/2-texto.html">02- Texto 2</a> |
        <a href wm-nav="exercicios/3-listas.html">03- Listas</a>
        <a href wm-nav="exercicios/4-listasAninhadas.html">04- Listas Aninhadas</a> |
        <a href wm-nav="exercicios/5-links.html">05- Links</a> |
        <a href wm-nav="exercicios/6-tabela.html">06- Tabela</a> |
        <a href wm-nav="exercicios/form/form.html">07- Formulário</a> |
        <a href wm-nav="exercicios/08-imagens.html">08- Imagens</a> |
        <a href wm-nav="exercicios/09-video.html">09- Video</a> |
        <a href wm-nav="exercicios/10-tagsNaoVisuais.html">10-tagsNaoVisuais</a> |
    </nav>
    <section id="conteudo"></section>
    <footer>
        Curso Web Moderno
    </footer>

    <script>
        document.querySelectorAll('[wm-nav]').forEach(link => {
            const conteudo = document.getElementById('conteudo')
            link.onclick = function (e) {
                e.preventDefault()

                fetch(link.getAttribute('wm-nav'))
                    .then(resp => resp.text())
                    .then(html => conteudo.innerHTML = html)
            }
        })
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Interativa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        details {
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            width: 300px;
        }
        summary {
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }
        ul {
            margin-top: 10px;
            padding-left: 20px;
        }
    </style>
</head>
<body>

    <!-- Lista 1: Oculta e exibe uma lista de itens -->
    <details>
        <summary>Ver Frutas</summary>
        <ul>
            <li>Maçã</li>
            <li>Banana</li>
            <li>Laranja</li>
        </ul>
    </details>

    <!-- Lista 2: Oculta e exibe um parágrafo longo -->
    <details>
        <summary>Mais Informações</summary>
        <p>Aqui você pode colocar qualquer outro conteúdo HTML, como textos detalhados ou links.</p>
    </details>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Anatomia CSS</title>
    <style>
        .selector {
            color: #ffffff;
            font-size: 30px;
            text-align: center;
            border: solid 2px navy;
            font-family: Helvetica, sans-serif;
            width: calc(100% - 100px);
            background-color: rgb(34, 154, 189);
            padding: 12px 0;
        }

        .selector:hover {
            background-color: orangered;
            color: black;
        }

        /* Usando pseudo elemento */
        .selector::first-letter{
            font-size: 45px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="selector">Conteúdo</div>
</body>

</html>
